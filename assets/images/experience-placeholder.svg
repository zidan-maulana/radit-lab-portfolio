<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%" height="100%">
  <rect width="400" height="500" fill="#202023"/>
  
  <!-- Grid/Line patterns -->
  <line x1="0" y1="100" x2="400" y2="100" stroke="#2d2d30" stroke-width="2"/>
  <line x1="0" y1="200" x2="400" y2="200" stroke="#2d2d30" stroke-width="2"/>
  <line x1="0" y1="300" x2="400" y2="300" stroke="#2d2d30" stroke-width="2"/>
  <line x1="0" y1="400" x2="400" y2="400" stroke="#2d2d30" stroke-width="2"/>
  <line x1="100" y1="0" x2="100" y2="500" stroke="#2d2d30" stroke-width="2"/>
  <line x1="200" y1="0" x2="200" y2="500" stroke="#2d2d30" stroke-width="2"/>
  <line x1="300" y1="0" x2="300" y2="500" stroke="#2d2d30" stroke-width="2"/>
  
  <rect x="100" y="150" width="200" height="200" rx="10" fill="none" stroke="#444446" stroke-width="2"/>
  <path d="M150 280 L200 220 L250 280" fill="none" stroke="#444446" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="200" cy="250" r="10" fill="none" stroke="#444446" stroke-width="2"/>
  
  <!-- Text Label -->
  <text x="200" y="380" font-family="'Plus Jakarta Sans', sans-serif" font-size="16" font-weight="bold" fill="#88888b" text-anchor="middle">EXPERIENCE PHOTO</text>
  <text x="200" y="405" font-family="'Plus Jakarta Sans', sans-serif" font-size="12" fill="#55555c" text-anchor="middle">Tilted CSS style applied (-3deg)</text>
  
  <rect x="10" y="10" width="380" height="480" fill="none" stroke="#3a3a3c" stroke-width="2" stroke-dasharray="6 6"/>
